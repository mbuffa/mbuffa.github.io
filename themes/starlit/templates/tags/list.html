{% extends "_layout.html" %}

{% block content %}
<article class="w-full">
  <header class="mb-4">
    <h1 class="font-bold text-xl text-accent">Tags</h1>
  </header>
  <ul class="flex flex-row flex-wrap gap-2">
    {% for term in terms %}
    <li>
      <a class="badge-chip text-sm" href="{{ term.permalink | safe }}">{{ term.name }}</a>
    </li>
    {% endfor %}
  </ul>
</article>
{% endblock content %}
