<div class="w-11/12 m-auto mt-2 mb-4 px-6 py-5 rounded-md bg-surface border border-token">
  <h1 class="text-2xl font-bold text-accent">
    {{ config.extra.author_name | default(value="My Site") }}
  </h1>
  <p class="font-sans text-base text-muted mt-1">
    {{ config.extra.author_tagline | default(value="") }}
  </p>
  <div class="mt-4 flex justify-start gap-2 flex-wrap">
    {% for link in config.extra.social_links | default(value=[]) %}
    <a href="{{ link.url }}" class="nav-link">{{ link.title }}</a>
    {% endfor %}
  </div>
</div>
