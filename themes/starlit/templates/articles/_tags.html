{% macro tags(terms) %}
<p class="max-w-fit m-auto">
  {% for term in terms %}
  <a class="inline-block m-1 px-2 py-0.5 rounded text-sm no-underline bg-teal-100 text-teal-800 hover:bg-teal-200 dark:bg-orange-500 dark:bg-opacity-20 dark:text-orange-400"
    href="/tags/{{term}}">
    {{ term }}
  </a>
  {% endfor %}
</p>
{% endmacro tags %}
