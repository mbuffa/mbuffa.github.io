{% macro link(href, title) %}
<a class="
    inline-block px-1 text-xs w-full no-underline leading-snug
    text-teal-700 hover:bg-teal-50 hover:text-teal-900 py-0.5 rounded
    dark:text-orange-500 dark:hover:text-orange-500 dark:hover:bg-neutral-900"
  href="{{href | safe}}" title="{{ title }}">
  {{ title }}
</a>
{% endmacro link %}
